<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Texas Hold'em Poker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>🎰 PROFESSIONAL TEXAS HOLD'EM 🎰</h1>
                <p class="subtitle">Premium Poker Experience</p>
            </div>
            <div class="game-info">
                <div class="info-group">
                    <div class="pot-display">
                        <span class="label">POT:</span>
                        <span class="value" id="potAmount">$0</span>
                    </div>
                    <div class="round-display">
                        <span class="label">ROUND:</span>
                        <span class="value" id="roundCounter">Round 1</span>
                    </div>
                </div>
                <div class="info-group">
                    <div class="stage-display">
                        <span class="label">STAGE:</span>
                        <span class="value" id="roundStage">Pre-Flop</span>
                    </div>
                    <div class="timer-display">
                        <span class="label">TIMER:</span>
                        <span class="value" id="timerDisplay">--</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="game-board">
            <!-- Community Cards -->
            <section class="community-cards">
                <h2>COMMUNITY CARDS</h2>
                <div class="cards-container" id="communityCards">
                    <div class="card-slot empty"></div>
                    <div class="card-slot empty"></div>
                    <div class="card-slot empty"></div>
                    <div class="card-slot empty"></div>
                    <div class="card-slot empty"></div>
                </div>
            </section>

            <!-- Players Table -->
            <section class="players-table">
                <div class="players-grid" id="playersContainer">
                    <!-- Players will be dynamically added here -->
                </div>
            </section>

            <!-- Game Controls -->
            <section class="game-controls">
                <div class="player-actions" id="playerActions">
                    <button class="btn btn-fold" id="foldBtn">FOLD</button>
                    <button class="btn btn-check" id="checkBtn">CHECK</button>
                    <button class="btn btn-call" id="callBtn">CALL</button>
                    <button class="btn btn-raise" id="raiseBtn">RAISE</button>
                    <button class="btn btn-all-in" id="allInBtn">ALL IN</button>
                </div>

                <!-- Bet Amount Input -->
                <div class="bet-control">
                    <label for="betAmount">Bet Amount:</label>
                    <input type="number" id="betAmount" min="0" placeholder="Enter amount">
                    <button class="btn btn-submit" id="submitBetBtn">SUBMIT</button>
                </div>

                <!-- Game Start Button -->
                <div class="game-start">
                    <button class="btn btn-primary" id="startGameBtn">START NEW GAME</button>
                    <button class="btn btn-secondary" id="nextRoundBtn" style="display: none;">NEXT ROUND</button>
                </div>
            </section>

            <!-- Game Messages -->
            <section class="game-messages">
                <div id="messageBox" class="message-box">
                    <p>Welcome to Premium Texas Hold'em! Click "START NEW GAME" to begin.</p>
                </div>
            </section>

            <!-- Statistics Panel -->
            <section class="stats-section">
                <div id="statsPanel" class="stats-panel">
                    <div class="stat-item">
                        <span class="stat-label">Hands Played:</span>
                        <span class="stat-value">0</span>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>🎰 Professional Texas Hold'em Poker Game | Premium Edition</p>
        </footer>
    </div>

    <script src="deck.js"></script>
    <script src="player.js"></script>
    <script src="game.js"></script>
    <script src="ui.js"></script>
    <script src="main.js"></script>
</body>
</html>
